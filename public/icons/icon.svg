<!-- public/icons/icon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo OLED -->
  <rect width="512" height="512" fill="#000000" rx="48" />

  <!-- Corner Brackets (Estilo Terminal/Matrix) -->
  <g stroke="#00FF41" stroke-width="10" fill="none" stroke-linecap="round">
    <path d="M 72 72 L 72 128 M 72 72 L 128 72" />
    <path d="M 440 72 L 440 128 M 440 72 L 384 72" />
    <path d="M 72 440 L 72 384 M 72 440 L 128 440" />
    <path d="M 440 440 L 440 384 M 440 440 L 384 440" />
  </g>

  <!-- Scanline Sutil -->
  <rect x="88" y="253" width="336" height="4" fill="#00FF41" rx="2" opacity="0.6" />

  <!-- Bitcoin Symbol (Bold + Glow) -->
  <g fill="#F7931A" filter="url(#glow)">
    <path d="M148 96h176c48 0 76 24 76 68 0 32-18 52-46 62 32 10 60 32 60 76 0 52-38 80-90 80H148V96zm28 28v96h124c24 0 38-14 38-38s-14-38-38-38H176zm0 124v112h144c28 0 48-18 48-48s-20-48-48-48H176z" />
    <rect x="118" y="76" width="14" height="360" rx="7" />
    <rect x="380" y="76" width="14" height="360" rx="7" />
  </g>

  <!-- Terminal Cursor (Estático para compatibilidad PWA) -->
  <rect x="456" y="236" width="16" height="40" fill="#00FF41" rx="4" opacity="0.85" />
</svg>